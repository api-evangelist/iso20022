name: ISO 20022
description: >
  ISO 20022 is the international financial messaging standard published by
  the International Organization for Standardization (ISO) that provides a
  common language and model for financial data. It defines business processes,
  data elements, and message definitions used by banks, payment systems,
  securities settlement systems, and other financial institutions worldwide for
  payment messages, securities messages, trade finance, and foreign exchange.
  SWIFT serves as the ISO 20022 Registration Authority, maintaining the
  message repository and e-Repository. As of 2025 ISO 20022 became the
  exclusive format for cross-border payments on the SWIFT network, with more
  than 60 central banks worldwide either completed or underway with migration.
image: https://www.iso20022.org/sites/default/files/2023-04/ISO20022_logo.png
tags:
  - Financial Messaging
  - Payments
  - Securities
  - Banking
  - ISO Standard
  - SWIFT
  - Financial Services
created: '2026-06-13'
modified: '2026-06-13'
